<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <nav>
      <h1 class="logo">MyPortfolio</h1>
      <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section id="home" class="hero">
    <h2>Hello, I'm <span>   Sathvik

  <section id="about">
    <h2>About Me</h2>
    <p>I am passionate about web development and creating visually stunning websites.</p>
  </section>

  <section id="projects">
    <h2>My Projects</h2>
    <div class="project-container">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>
    </div>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea placeholder="Your Message"></textarea>
    <button>Send</button>
  </section>

  <footer>
    <p>© 2026 Your Name | All Rights Reserved</p>
  </footer>

</body>
</html>
